<aside class="blog-sidebar">
  <h2 class="sidebar-heading">Sections</h2>
  <ul class="sidebar-sections">
    <li class="sidebar-section {% if page.category == nil %}is-current{% endif %}">
      <a href="{{ '/' | relative_url }}">All posts</a>
      <span class="sidebar-count">{{ site.posts | size }}</span>
    </li>
    {% assign sections = site.sections | sort: "order" %}
    {% for section in sections %}
    {% assign count = site.categories[section.category] | size %}
    <li class="sidebar-section {% if page.category == section.category %}is-current{% endif %}">
      <a href="{{ section.url | relative_url }}">{{ section.title }}</a>
      <span class="sidebar-count">{{ count }}</span>
    </li>
    {% endfor %}
  </ul>
</aside><!-- .blog-sidebar -->
