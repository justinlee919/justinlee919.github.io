---
layout: default
---

<div class="blog-layout fadeInDown delay_075s">

  {% include sidebar.html %}

  <main class="main-content blog-main">

    {% assign posts = site.categories[page.category] %}
    {% if posts and posts != empty %}
      {% for post in posts %}
        {% include post-card.html %}
      {% endfor %}
    {% else %}
      <p class="section-empty">No posts in this section yet. Check back soon.</p>
    {% endif %}

  </main><!-- .blog-main -->

</div><!-- .blog-layout -->
